<svg xmlns="http://www.w3.org/2000/svg" width="740" height="300" viewBox="0 0 740 300" font-family="ui-monospace, Menlo, Consolas, monospace">
  <style>
    .sig   { stroke: #111; stroke-width: 2; fill: none; stroke-linejoin: miter; }
    .bus   { stroke: #111; stroke-width: 1.5; fill: none; }
    .lbl   { font-size: 15px; font-weight: 600; fill: #111; }
    .bit   { font-size: 11px; fill: #111; text-anchor: middle; }
    .tick  { font-size: 10px; fill: #555; text-anchor: middle; }
    .level { font-size: 9px;  fill: #888; }
    .guide { stroke: #ccc; stroke-width: 1; stroke-dasharray: 3,3; }
    .edge  { stroke: #bbb; stroke-width: 1; stroke-dasharray: 2,3; }
  </style>

  <!-- ================= LATCH ================= -->
  <text x="10" y="68" class="lbl">LATCH</text>
  <text x="60" y="48" class="level">H</text>
  <text x="60" y="92" class="level">L</text>
  <path class="sig" d="M 80 85 L 80 40 L 116 40 L 116 85 L 720 85" />
  <text x="98"  y="32" class="tick">12 µs</text>
  <text x="125" y="100" class="tick">6 µs</text>
  <line class="edge" x1="134" y1="40" x2="134" y2="270" />

  <!-- ================= CLOCK ================= -->
  <text x="10" y="158" class="lbl">CLOCK</text>
  <text x="60" y="138" class="level">H</text>
  <text x="60" y="182" class="level">L</text>
  <path class="sig" d="
    M 80 130 L 134 130
    L 134 175 L 152 175 L 152 130 L 170 130
    L 170 175 L 188 175 L 188 130 L 206 130
    L 206 175 L 224 175 L 224 130 L 242 130
    L 242 175 L 260 175 L 260 130 L 278 130
    L 278 175 L 296 175 L 296 130 L 314 130
    L 314 175 L 332 175 L 332 130 L 350 130
    L 350 175 L 368 175 L 368 130 L 386 130
    L 386 175 L 404 175 L 404 130 L 422 130
    L 422 175 L 440 175 L 440 130 L 458 130
    L 458 175 L 476 175 L 476 130 L 494 130
    L 494 175 L 512 175 L 512 130 L 530 130
    L 530 175 L 548 175 L 548 130 L 566 130
    L 566 175 L 584 175 L 584 130 L 602 130
    L 602 175 L 620 175 L 620 130 L 638 130
    L 638 175 L 656 175 L 656 130 L 674 130
    L 674 175 L 692 175 L 692 130 L 720 130
  " />
  <text x="143" y="195" class="tick">6 µs</text>
  <text x="161" y="120" class="tick">6 µs</text>
  <text x="400" y="120" class="tick">× 16 cycles (≈ 192 µs total)</text>

  <!-- ================= DATA ================= -->
  <text x="10" y="248" class="lbl">DATA</text>
  <!-- bus rails -->
  <line class="bus" x1="80"  y1="225" x2="720" y2="225" />
  <line class="bus" x1="80"  y1="265" x2="720" y2="265" />
  <!-- left closure (data becomes valid when LATCH loads) -->
  <line class="bus" x1="80"  y1="225" x2="80"  y2="265" />
  <!-- transitions at each rising CLOCK edge -->
  <g class="bus">
    <line x1="152" y1="225" x2="152" y2="265" />
    <line x1="188" y1="225" x2="188" y2="265" />
    <line x1="224" y1="225" x2="224" y2="265" />
    <line x1="260" y1="225" x2="260" y2="265" />
    <line x1="296" y1="225" x2="296" y2="265" />
    <line x1="332" y1="225" x2="332" y2="265" />
    <line x1="368" y1="225" x2="368" y2="265" />
    <line x1="404" y1="225" x2="404" y2="265" />
    <line x1="440" y1="225" x2="440" y2="265" />
    <line x1="476" y1="225" x2="476" y2="265" />
    <line x1="512" y1="225" x2="512" y2="265" />
    <line x1="548" y1="225" x2="548" y2="265" />
    <line x1="584" y1="225" x2="584" y2="265" />
    <line x1="620" y1="225" x2="620" y2="265" />
    <line x1="656" y1="225" x2="656" y2="265" />
  </g>
  <!-- bit labels (12 buttons + 4 unused) -->
  <g>
    <text x="116" y="250" class="bit">B</text>
    <text x="170" y="250" class="bit">Y</text>
    <text x="206" y="250" class="bit">Sel</text>
    <text x="242" y="250" class="bit">St</text>
    <text x="278" y="250" class="bit">Up</text>
    <text x="314" y="250" class="bit">Dn</text>
    <text x="350" y="250" class="bit">Lf</text>
    <text x="386" y="250" class="bit">Rt</text>
    <text x="422" y="250" class="bit">A</text>
    <text x="458" y="250" class="bit">X</text>
    <text x="494" y="250" class="bit">L</text>
    <text x="530" y="250" class="bit">R</text>
    <text x="566" y="250" class="bit">—</text>
    <text x="602" y="250" class="bit">—</text>
    <text x="638" y="250" class="bit">—</text>
    <text x="674" y="250" class="bit">—</text>
  </g>

  <!-- time axis note -->
  <text x="400" y="290" class="tick">time →</text>
</svg>
